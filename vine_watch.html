<button onclick="loadWeather()" style="padding: 12px 24px; font-size: 18px; cursor: pointer; background-color: #27ae60; color: white; border: none; border-radius: 5px;">
  Εμφάνιση πρόβλεψης για σήμερα
</button>

<div id="weather-report" style="margin-top: 20px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; display: none;">
  <pre id="data-content" style="font-family: Arial, sans-serif; font-size: 16px; white-space: pre-wrap;"></pre>
</div>

<script>
  function loadWeather() {
    const reportDiv = document.getElementById('weather-report');
    const contentPre = document.getElementById('data-content');
    reportDiv.style.display = 'block';
    contentPre.innerText = "Αναμονή δεδομένων...";

    // Χρήση ενός τυχαίου παραμέτρου για να μην κρατάει ο browser παλιά δεδομένα (cache)
    const url = 'https://raw.githubusercontent.com/kkotsionopoulos/kkotsionopoulos.github.io/main/result.txt?_=' + new Date().getTime();

    fetch(url)
      .then(response => response.text())
      .then(data => {
        if(data.length > 0) {
            contentPre.innerText = data;
        } else {
            contentPre.innerText = "Το αρχείο είναι άδειο. Παρακαλώ δοκιμάστε αργότερα.";
        }
      })
      .catch(() => {
        contentPre.innerText = "Σφάλμα φόρτωσης. Ελέγξτε τη σύνδεση.";
      });
  }
</script>
