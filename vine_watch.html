<div style="border: 1px solid #ccc; padding: 25px; border-radius: 8px; background: #fff; max-width: 650px; margin: auto;">
    <h3>VineWatch - Ψηφιακή Γεωπονική Παρακολούθηση</h3>
    <button onclick="loadWeather()" style="background: #2c3e50; color: white; padding: 10px 15px; border: none; cursor: pointer;">
        Ενημέρωση Ανάλυσης
    </button>
    <div id="weather-report" style="margin-top: 20px; display: none;">
        <pre id="data-content" style="white-space: pre-wrap; font-family: sans-serif;"></pre>
    </div>
</div>

<script>
  function loadWeather() {
    const reportDiv = document.getElementById('weather-report');
    const contentPre = document.getElementById('data-content');
    reportDiv.style.display = 'block';
    fetch('result.txt?_=' + new Date().getTime(), { cache: "no-store" })
      .then(r => r.text())
      .then(data => { contentPre.innerText = data; });
  }
</script>
