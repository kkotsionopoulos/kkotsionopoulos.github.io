<style>
    .vine-container {
        border: 1px solid #ccc;
        border-radius: 8px;
        padding: 20px;
        background: #fdfdfd;
        max-width: 600px;
        margin: 20px auto;
    }
    .vine-btn {
        background-color: #2c3e50;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }
    #data-content {
        white-space: pre-wrap;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        line-height: 1.5;
    }
</style>

<div class="vine-container">
    <h3>VineWatch - Ψηφιακή Γεωπονική Παρακολούθηση</h3>
    <button class="vine-btn" onclick="loadWeather()">Εμφάνιση ανάλυσης κινδύνου</button>
    
    <div id="weather-report" style="margin-top: 20px; display: none;">
        <pre id="data-content"></pre>
    </div>
</div>

<script>
  function loadWeather() {
    const reportDiv = document.getElementById('weather-report');
    const contentPre = document.getElementById('data-content');
    reportDiv.style.display = 'block';
    contentPre.innerText = "Ανάλυση δεδομένων σε εξέλιξη...";

    fetch('https://raw.githubusercontent.com/kkotsionopoulos/kkotsionopoulos.github.io/main/result.txt?_=' + new Date().getTime())
      .then(r => r.text())
      .then(data => { contentPre.innerText = data; })
      .catch(() => { contentPre.innerText = "Σφάλμα φόρτωσης."; });
  }
</script>
