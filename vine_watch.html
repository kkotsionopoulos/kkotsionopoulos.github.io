<style>
    .button-group { display: flex; gap: 10px; margin-top: 20px; }
    .vine-btn { background: #2c3e50; color: #fff; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; flex: 1; }
    .vine-btn.secondary { background: #27ae60; }
    #chart-container { margin-top: 25px; padding: 20px; background: #fff; border: 1px solid #eee; display: none; }
</style>

<div class="vine-container">
    <h2>VineWatch: Πρόβλεψη Περονόσπορου</h2>
    <div class="button-group">
        <button class="vine-btn" onclick="loadWeather()">Ανάλυση</button>
        <button class="vine-btn secondary" onclick="updateChart()">Γράφημα Τάσης</button>
    </div>
    <div id="weather-report"><pre id="data-content" style="white-space: pre-wrap; font-family: sans-serif;"></pre></div>
    
    <div id="chart-container">
        <h3>Γράφημα Τάσης Υγρασίας (%)</h3>
        <canvas id="vineChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let chartInstance = null;

  async function updateChart() {
    document.getElementById('chart-container').style.display = 'block';
    const response = await fetch('result.txt?t=' + new Date().getTime());
    const text = await response.text();
    
    // Εξαγωγή τιμών υγρασίας με Regular Expressions
    const matches = text.match(/Υγρασία: (\d+)%/g);
    const humData = matches.map(m => parseInt(m.match(/\d+/)[0]));

    const ctx = document.getElementById('vineChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Χθες', 'Σήμερα', 'Αύριο'],
            datasets: [{
                label: 'Υγρασία (%)',
                data: humData,
                borderColor: '#27ae60',
                backgroundColor: 'rgba(39, 174, 96, 0.2)',
                fill: true
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
    });
  }
</script>
