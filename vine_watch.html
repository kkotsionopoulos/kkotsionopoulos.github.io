<div class="vine-container" style="border: 1px solid #ccc; padding: 20px; max-width: 600px; margin: auto; font-family: sans-serif;">
    <h3>VineWatch - Γεωργία Ακριβείας</h3>
    <button onclick="loadWeather()" style="padding: 10px; background: #2c3e50; color: white; border: none; cursor: pointer;">
        Ενημέρωση Δεδομένων
    </button>
    <pre id="data-content" style="margin-top: 20px; white-space: pre-wrap; font-family: monospace;"></pre>
</div>

<script>
  function loadWeather() {
    const pre = document.getElementById('data-content');
    pre.innerText = "Φόρτωση...";
    // Το random number εξασφαλίζει ότι θα φέρει ΠΑΝΤΑ το νέο αρχείο
    fetch('result.txt?t=' + new Date().getTime(), { cache: "no-store" })
      .then(r => r.text())
      .then(data => { pre.innerText = data; });
  }
</script>
