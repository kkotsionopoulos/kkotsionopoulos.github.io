<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Επικοινωνία | Κωνσταντίνος Κωτσιονόπουλος</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* NAVBAR */
        .navbar {
    background-color: #2c3e50 !important;
    padding: 10px 0;
    width: 100%;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1050;
}

/* 2. Το κοντέινερ για κεντράρισμα */
.nav-container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 3. Τα κουμπιά (Links) */
.nav-links {
    display: flex;
    gap: 8px; /* Μικρό κενό για το κινητό */
}

.nav-links a {
    display: inline-block;
    padding: 6px 12px;
    background-color: transparent;
    color: white !important;
    border: 1.5px solid #27ae60; /* Το πράσινο περίγραμμα */
    border-radius: 20px; /* Στρογγυλεμένες γωνίες */
    text-decoration: none;
    font-weight: bold;
    font-size: 0.8em;
    white-space: nowrap;
    transition: 0.3s;
}

/* Εφέ Hover */
.nav-links a:hover {
    background-color: #27ae60;
    color: white !important;
}

/* 4. Κενό στην κορυφή του περιεχομένου για να μην κρύβεται πίσω από το navbar */
header, .portfolio-grid, .contact-card {
    margin-top: 80px !important;
}

        /* CONTACT CARD */
        .contact-card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            width: 90%; 
            max-width: 450px; 
            border-top: 5px solid var(--accent-color);
            box-sizing: border-box;
            margin: 50px 20px; /* Κενό από το navbar και τα πλάγια */
        }

        h2 { 
            color: var(--primary-color); 
            border-left: 5px solid var(--accent-color); 
            padding-left: 15px; 
            font-size: 1.5em; 
            margin-top: 0;
        }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; /* Εμποδίζει το αυτόματο zoom σε iOS */
            font-family: inherit;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(39, 174, 96, 0.2);
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover { background-color: #219150; }

        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 25px; 
            color: #666; 
            text-decoration: none; 
            font-size: 0.9em; 
            font-weight: 500; 
        }

        .back-link:hover { text-decoration: underline; }

        /* Tablet/Desktop Styles */
        @media (min-width: 600px) {
            .nav-container {
                flex-direction: row;
                justify-content: space-between;
            }
            .nav-links {
                margin-top: 0;
            }
            .nav-links a {
                font-size: 1em;
                margin-left: 15px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        
        <div class="nav-links">
            <a href="index.html">Βιογραφικό</a>
            <a href="portfolio.html">Blog & Projects</a>
            <a href="contact.html">Επικοινωνία</a>
        </div>
    </div>
</nav>

<div class="contact-card">
    <h2>Επικοινωνία - Contact</h2>
    <form action="https://formspree.io/f/xrejrabl" method="POST">
        <input type="text" name="name" placeholder="Το όνομά σας" required>
        <input type="email" name="_replyto" placeholder="Το email σας" required>
        <textarea name="message" rows="5" placeholder="Το μήνυμά σας" required></textarea>
        <button type="submit">Αποστολή Μηνύματος - Send Mail</button>
    </form>
    <a href="index.html" class="back-link">← Επιστροφή στο Βιογραφικό - Return to CV</a>
</div>

</body>
</html>
