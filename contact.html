<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Επικοινωνία | Κωνσταντίνος Κωτσιονόπουλος</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .contact-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; border-left: 5px solid #27ae60; padding-left: 15px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219150; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="contact-card">
    <h2>Φόρμα Επικοινωνίας</h2>
    <form action="https://formspree.io/f/xrejrabl" method="POST">
        <input type="text" name="name" placeholder="Το όνομά σας" required>
        <input type="email" name="_replyto" placeholder="Το email σας" required>
        <textarea name="message" rows="5" placeholder="Το μήνυμά σας" required></textarea>
        <button type="submit">Αποστολή Μηνύματος</button>
    </form>
    <a href="index.html" class="back-link">← Επιστροφή στο Βιογραφικό</a>
</div>

</body>
</html>
