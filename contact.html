<!DOCTYPE html>
<html lang="el">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Επικοινωνία | Κωνσταντίνος Κωτσιονόπουλος</title>
    <style>
        /* Χρησιμοποιούμε min-height αντί για height για να μην κόβεται η φόρμα αν είναι μεγάλη */
        body { 
    font-family: 'Segoe UI', sans-serif; 
    background-color: #f4f7f6; 
    margin: 0; 
    display: flex; 
    flex-direction: column; /* Τα στοιχεία μπαίνουν το ένα κάτω από το άλλο */
    align-items: center; 
    min-height: 100vh; 
}

        

        h2 { color: #2c3e50; border-left: 5px solid #27ae60; padding-left: 15px; font-size: 1.5em; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 16px; /* 16px εμποδίζει το αυτόματο "ζουμ" του iPhone όταν γράφεις */
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1em;
            margin-top: 10px;
        }

        button:hover { background-color: #219150; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #666; text-decoration: none; font-size: 1em; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
		
		.navbar {
    width: 100%; /* Το μενού να πιάνει όλο το πλάτος */
    background-color: #2c3e50;
    padding: 15px 0;
    position: static; /* Ή sticky αν θέλεις να μένει καθώς σκρολάρεις */
    margin-bottom: 50px; /* Κενό ανάμεσα στο μενού και την κάρτα */
}

.contact-card { 
    background: white; 
    padding: 30px; 
    border-radius: 12px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    width: 90%; 
    max-width: 450px; 
    border-top: 5px solid #27ae60;
    box-sizing: border-box;
    /* Αφαιρούμε το αυτόματο κεντράρισμα που την πήγαινε στη μέση */
}
.nav-container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}
.nav-links a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}
.nav-links a:hover { color: #27ae60; }

@media (max-width: 600px) {
    .nav-container { flex-direction: column; }
    .nav-links { margin-top: 10px; }
    .nav-links a { margin: 0 10px; font-size: 0.9em; }
}
		
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">Κ. Κωτσιονόπουλος</a>
        <div class="nav-links">
            <a href="index.html">Βιογραφικό</a>
            <a href="portfolio.html">Blog & Projects</a>
            <a href="contact.html">Επικοινωνία</a>
        </div>
    </div>
</nav>

<div class="contact-card">
    <h2>Επικοινωνία - Contact</h2>
    <form action="https://formspree.io/f/xrejrabl" method="POST">
        <input type="text" name="name" placeholder="Το όνομά σας" required>
        <input type="email" name="_replyto" placeholder="Το email σας" required>
        <textarea name="message" rows="5" placeholder="Το μήνυμά σας" required></textarea>
        <button type="submit">Αποστολή Μηνύματος - Send Mail</button>
    </form>
    <a href="index.html" class="back-link">← Επιστροφή στο Βιογραφικό - Return to cv</a>
</div>

</body>
</html>
