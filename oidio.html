<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>OidioWatch | Smart Agronomy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent-color: #e67e22; }
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .oidio-container { max-width: 700px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .risk-high { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; }
        .risk-med { background: #f1c40f; padding: 2px 6px; border-radius: 4px; }
        .risk-low { background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; }
        .oidio-btn { background: #e67e22; color: #fff; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="oidio-container">
    <h2>OidioWatch: Πρόβλεψη Ωιδίου</h2>
    <div id="status-dashboard">
        <p><strong>Στιγμιαία:</strong> <span id="current-status">...</span></p>
        <p><strong>Σήμερα:</strong> <span id="today-forecast">...</span></p>
        <p><strong>Αύριο:</strong> <span id="tomorrow-forecast">...</span></p>
    </div>
    <button class="oidio-btn" onclick="showChart()">Γράφημα Κινδύνου</button>
    <div id="chart-container" style="display:none;"><canvas id="oidioChart"></canvas></div>
</div>

<script>
  let myChart;
  async function loadData() {
    const response = await fetch('result_oidio.txt?t=' + new Date().getTime());
    const d = await response.text();
    
    // Εμφάνιση κειμένου...
    // (Χρησιμοποίησε την ίδια λογική getSection όπως πριν)

    window.showChart = () => {
        document.getElementById('chart-container').style.display = 'block';
        const match = d.match(/RiskValues:\s*([\d,]+)/);
        const riskData = match ? match[1].split(',').map(Number) : [30, 50, 50];
        
        const ctx = document.getElementById('oidioChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['Στιγμιαία', 'Σήμερα', 'Αύριο'], datasets: [{ label: 'Κίνδυνος (%)', data: riskData, borderColor: '#e67e22', fill: true }] },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    };
  }
  window.onload = loadData;
</script>
</body>
</html>
