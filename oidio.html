<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>OidioWatch | Smart Agronomy</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .oidio-container { max-width: 700px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .live-panel { background: #2c3e50; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-around; text-align: center; }
        .risk-high { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .risk-med { background: #f1c40f; color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .risk-low { background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="oidio-container">
    <h2>OidioWatch: Πρόβλεψη Ωιδίου</h2>
    <div id="last-update" style="font-size: 0.8em; color: #777;"></div>
    
    <div class="live-panel">
        <div><small>Θερμοκρασία</small><br><strong id="val-temp">-</strong>°C</div>
        <div><small>Υγρασία</small><br><strong id="val-hum">-</strong>%</div>
        <div><small>Ανεμος</small><br><strong id="val-wind">-</strong> km/h</div>
    </div>

    <div id="status-dashboard" style="margin-top:20px;"></div>
</div>

<script>
  fetch('result_oidio.txt?t=' + new Date().getTime())
    .then(r => r.text())
    .then(d => {
        // Εμφάνιση ώρας ενημέρωσης
        const lines = d.split('\n');
        document.getElementById('last-update').innerText = lines[0];
        
        // Χρωματισμός κινδύνου
        let html = d.replace(/ΥΨΗΛΟΣ ΚΙΝΔΥΝΟΣ/g, '<span class="risk-high">ΥΨΗΛΟΣ ΚΙΝΔΥΝΟΣ</span>')
                    .replace(/ΜΕΤΡΙΟΣ ΚΙΝΔΥΝΟΣ/g, '<span class="risk-med">ΜΕΤΡΙΟΣ ΚΙΝΔΥΝΟΣ</span>')
                    .replace(/ΧΑΜΗΛΟΣ ΚΙΝΔΥΝΟΣ/g, '<span class="risk-low">ΧΑΜΗΛΟΣ ΚΙΝΔΥΝΟΣ</span>')
                    .replace(/\n/g, '<br>');
        document.getElementById('status-dashboard').innerHTML = html;

        // Ενημέρωση Live Panel από τη "ΣΤΙΓΜΙΑΙΑ ΚΑΤΑΣΤΑΣΗ"
        const startIdx = lines.findIndex(l => l.includes("ΣΤΙΓΜΙΑΙΑ ΚΑΤΑΣΤΑΣΗ"));
        if (startIdx !== -1) {
            // Παίρνουμε τις 3 επόμενες γραμμές μετά τον τίτλο
            const tempLine = lines[startIdx + 2]; // Θερμοκρασία: XX
            const humLine = lines[startIdx + 3];  // Υγρασία: XX
            const windLine = lines[startIdx + 4]; // Άνεμος: XX
            
            // Καθαρισμός για να μείνει μόνο το νούμερο
            document.getElementById('val-temp').innerText = tempLine.split(': ')[1] || "-";
            document.getElementById('val-hum').innerText = humLine.split(': ')[1] || "-";
            document.getElementById('val-wind').innerText = windLine.split(': ')[1] || "-";
        }
    });
</script>
</body>
</html>
