<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>OidioWatch</title>
    <style>
        .live-panel { background: #2c3e50; color: white; padding: 20px; display: flex; justify-content: space-around; border-radius: 10px; }
    </style>
</head>
<body>

<div class="live-panel">
    <div><small>Θερμοκρασία</small><br><strong id="val-temp">-</strong>°C</div>
    <div><small>Υγρασία</small><br><strong id="val-hum">-</strong>%</div>
    <div><small>Ανεμος</small><br><strong id="val-wind">-</strong> km/h</div>
</div>

<div id="content" style="margin-top:20px; padding:20px; background:#f9f9f9;"></div>

<script>
  fetch('result_oidio.txt?t=' + new Date().getTime())
    .then(r => r.text())
    .then(d => {
        // Εμφάνιση του περιεχομένου για debugging
        document.getElementById('content').innerText = d;
        
        // Συνάρτηση για να βρίσκει την τιμή μετά από μια λέξη-κλειδί
        const getValue = (text, key) => {
            const regex = new RegExp(key + ":\\s*([^\\n]+)", "i");
            const match = text.match(regex);
            return match ? match[1].trim() : "-";
        };

        document.getElementById('val-temp').innerText = getValue(d, "Θερμοκρασία");
        document.getElementById('val-hum').innerText = getValue(d, "Υγρασία");
        document.getElementById('val-wind').innerText = getValue(d, "Άνεμος");
    });
</script>
</body>
</html>
