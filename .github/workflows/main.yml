name: VineWatch Simple
on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ΑΠΑΡΑΙΤΗΤΟ για να μπορεί να γράψει στο repo
   
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run main.py (Περονόσπορος)
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python main.py

      - name: Run main_oidio.py (Ωίδιο)
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python main_oidio.py

      - name: Run main_scab.py (Φουζικλάδιο)
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python main_scab.py

      - name: Push results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # Προσθέτουμε τα αρχεία στο staging area
          git add result.txt result_oidio.txt result_scab.txt
          
          # Αν δεν υπάρχουν αλλαγές, βγαίνουμε χωρίς error
          git diff --quiet && git diff --staged --quiet && exit 0
          
          # Κάνουμε commit τις αλλαγές μας
          git commit -m "Update all disease data"
          
          # Τραβάμε τις αλλαγές από το GitHub πριν κάνουμε push
          git pull --rebase origin main
          
          # Τελικό push
          git push origin main