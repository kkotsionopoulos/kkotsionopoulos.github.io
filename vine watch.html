<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>VineWatch - Πρόγνωση</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 50px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .status-box { padding: 30px; border-radius: 15px; color: white; font-weight: bold; font-size: 1.8em; margin: 25px 0; }
        .danger { background-color: #d9534f; }
        .safe { background-color: #5cb85c; }
        button { background: #333; color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>VineWatch AI</h1>
        <div id="display-area" class="status-box" style="display: none;"></div>
        <button onclick="updateStatus()">Προβολή Αποτελέσματος</button>
    </div>

    <script>
        async function updateStatus() {
            try {
                const response = await fetch('result.txt');
                const data = await response.text();
                const area = document.getElementById('display-area');
                
                area.style.display = 'block';
                if (data.includes("ΚΙΝΔΥΝΟΣ")) {
                    area.className = 'status-box danger';
                    area.innerHTML = "⚠️ ΚΙΝΔΥΝΟΣ";
                } else {
                    area.className = 'status-box safe';
                    area.innerHTML = "✅ ΑΣΦΑΛΕΣ";
                }
            } catch (error) {
                alert("Το αρχείο αποτελεσμάτων δεν βρέθηκε. Βεβαιώσου ότι το GitHub Action έτρεξε!");
            }
        }
    </script>
</body>
</html>
